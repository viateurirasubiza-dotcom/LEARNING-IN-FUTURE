<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <title>P1 Math - Lesson 3.5</title>
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<header>
    <h1>Quiz - Gukuba & Kugabanya</h1>
</header>

<main>

<section class="classes">
    <div class="card">
        <p>2 × 3 = ?</p>

        <button onclick="check(5)">5</button>
        <button onclick="check(6)">6</button>
        <button onclick="check(7)">7</button>
    </div>
</section>

<script>
function check(ans){
    if(ans === 6){
        alert("Ni byo!");
    } else {
        alert("Ongera ugerageze");
    }
}
</script>

</main>

</body>
</html>
